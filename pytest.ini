[pytest]
# Pytest configuration for Anubis RAG Engine

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode - use legacy to avoid strict initialization in CI
asyncio_mode = legacy

# Test options
addopts = 
    -v
    --tb=short
    --strict-markers
    --timeout=30
    --timeout-method=signal

# Markers for test categorization
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests (can be skipped in CI)
