[pytest]
# Pytest configuration for Anubis RAG Engine

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Coverage options (when run with pytest-cov)
# pytest --cov=anubis --cov-report=html

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: unit tests
    integration: integration tests
    slow: slow running tests
    parser: parser tests
    chunker: chunker tests
    embedder: embedder tests
    mcp: MCP server tests
    api: FastAPI endpoint tests

# Timeout for tests (in seconds)
timeout = 30
