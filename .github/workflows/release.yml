name: Release

on:
  push:
    tags:
      - v*

jobs:
  test-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  build-and-publish:
    needs: test-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image to GHCR
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner | downcase }}/anubis:latest
          ghcr.io/${{ github.repository_owner | downcase }}/anubis:${{ steps.version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  create-release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body: |
          ## Anubis RAG Engine v${{ steps.version.outputs.VERSION }}
          
          Docker image available on GitHub Container Registry:
          ```
          ghcr.io/madsht/anubis:${{ steps.version.outputs.VERSION }}
          ghcr.io/madsht/anubis:latest
          ```
          
          Pull the image:
          ```bash
          docker pull ghcr.io/madsht/anubis:${{ steps.version.outputs.VERSION }}
          ```
          
          See [DEPLOYMENT.md](https://github.com/MadsHT/anubis/blob/main/DEPLOYMENT.md) for deployment instructions.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
