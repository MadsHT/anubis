name: Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install documentation tools
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material markdown
    
    - name: Check README
      run: |
        if [ ! -f README.md ]; then
          echo "README.md is missing"
          exit 1
        fi
        wc -l README.md
    
    - name: Validate markdown
      run: |
        # Check markdown files exist and are readable
        python -c "
        import re
        files = ['README.md', 'tests/README.md']
        for f in files:
            try:
                with open(f) as file:
                    content = file.read()
                    # Basic validation: check for common markdown issues
                    if not content.strip():
                        print(f'WARNING: {f} is empty')
                    print(f'✓ {f}: {len(content)} chars')
            except Exception as e:
                print(f'WARNING: Could not read {f}: {e}')
        "

  changelog:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Create CHANGELOG template if missing
      run: |
        if [ ! -f CHANGELOG.md ]; then
          echo "Creating CHANGELOG.md template..."
          touch CHANGELOG.md
        fi
    
    - name: Check documentation completeness
      run: |
        echo "Checking documentation files..."
        test -f README.md && echo "✓ README.md exists"
        test -f tests/README.md && echo "✓ tests/README.md exists"
        test -f LICENSE && echo "✓ LICENSE exists"
