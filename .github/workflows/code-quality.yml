name: Code Quality & Formatting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install formatting tools
      run: |
        pip install black isort ruff
    
    - name: Format with Black
      run: black anubis/ tests/
    
    - name: Sort imports with isort
      run: isort anubis/ tests/
    
    - name: Lint with Ruff
      run: ruff check --fix anubis/ tests/ || true
    
    - name: Commit formatting changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "style: auto-format code [skip ci]"
    
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.head_ref }}
      if: github.event_name == 'pull_request'

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install mypy
      run: |
        pip install mypy types-requests
    
    - name: Type check with mypy
      run: mypy anubis/ --ignore-missing-imports || true

  complexity:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Radon
      run: |
        pip install radon
    
    - name: Analyze complexity
      run: |
        radon cc anubis/ -s
        radon mi anubis/ -s
