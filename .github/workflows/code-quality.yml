name: Code Quality & Formatting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install formatting tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort ruff
    
    - name: Run Black formatter
      run: black anubis/ tests/ --line-length 127
    
    - name: Run isort for import sorting
      run: isort anubis/ tests/
    
    - name: Run Ruff linter
      run: ruff check anubis/ tests/ --fix
    
    - name: Commit formatting changes (if any)
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "style: Auto-format code with Black, isort, and Ruff"
        commit_options: '--no-verify'
        file_pattern: 'anubis/ tests/'
        skip_fetch: false

  type-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install type checker
      run: |
        python -m pip install --upgrade pip
        pip install mypy types-all
    
    - name: Run mypy type checking
      run: mypy anubis/ --ignore-missing-imports --no-error-summary
      continue-on-error: true

  complexity:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install complexity checkers
      run: |
        python -m pip install --upgrade pip
        pip install radon
    
    - name: Check cyclomatic complexity
      run: |
        radon cc anubis/ -s -a
    
    - name: Check maintainability index
      run: |
        radon mi anubis/ -s
