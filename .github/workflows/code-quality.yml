name: Code Quality & Formatting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort ruff mypy
    
    - name: Check formatting with Black
      run: black --check anubis/ tests/ || true
    
    - name: Check import sorting with isort
      run: isort --check-only anubis/ tests/ || true
    
    - name: Lint with Ruff
      run: ruff check anubis/ tests/ || true
    
    - name: Lint with Flake8
      run: flake8 anubis/ tests/ --max-line-length=100 --extend-ignore=E203,W503 || true
    
    - name: Type check with mypy
      run: mypy anubis/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: bandit -r anubis/ -ll -f json -o bandit-report.json || true
    
    - name: Run Safety vulnerability check
      run: safety check --json || true
