version: '3.8'

services:
  rag-server:
    image: ghcr.io/madsht/anubis:v0.1
    container_name: anubis-rag-server
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=postgresql://${DB_USER:-anubis_user}:${DB_PASSWORD:-anubis_password}@postgres:5432/${DB_NAME:-anubis_db}
      - WORKERS=4
      - LOG_LEVEL=INFO
      - AUTO_INDEX_INTERVAL=300
      - DOCUMENTS_PATH=/documents
    volumes:
      - anubis_documents:/documents
      - anubis_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - anubis-network

  postgres:
    image: pgvector/pgvector:pg16-latest
    container_name: anubis-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-anubis_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-anubis_password}
      - POSTGRES_DB=${DB_NAME:-anubis_db}
    volumes:
      - anubis_postgres_data:/var/lib/postgresql
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anubis_user} -d ${DB_NAME:-anubis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anubis-network

  ollama:
    image: ollama/ollama:latest
    container_name: anubis-ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    volumes:
      - anubis_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama serve --version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - anubis-network

volumes:
  anubis_postgres_data:
    driver: local
  anubis_ollama_data:
    driver: local
  anubis_documents:
    driver: local
  anubis_logs:
    driver: local

networks:
  anubis-network:
    driver: bridge
